    - generic [ref=e291]:
      - heading "Estrutura" [level=2] [ref=e292]
      - paragraph [ref=e293]: No total são seis suítes e um quarto, comportam até 34 pessoas em camas confortavelmente. A cozinha é bem completa com eletrodomésticos modernos, panelas e fogão industriais e grande número de utensílios diversos, para preparar os mais variados tipos de comida e servir os hóspedes. O Espaço Gourmet possui amplo espaço para confraternizações, churrasqueira, forno e fogão a lenha, freezer, bar rústico, vários conjuntos de mesas bistrô inclusas e caso haja um grande número de pessoas no evento temos cadeiras e mesas para serem alugadas à parte. A ampla área do sítio permite a realização para eventos de até 400 pessoas e comporta um grande número de carros.
      - generic "Vídeo aéreo do Sítio Itaguaçú mostrando a estrutura e cachoeira" [ref=e294]: Seu navegador não suporta vídeos HTML5.
      - link "Galeria de Fotos" [ref=e295] [cursor=pointer]:
        - /url: gallery
    - generic [ref=e297]:
