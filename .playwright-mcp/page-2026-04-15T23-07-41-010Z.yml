      - paragraph [ref=e300]: Estrada Municipal do Baygton, 155 - Vale Tranquilo, Embu-Guaçu - SP, 06900-000
    - generic [ref=e302]:
      - heading "Natureza e Lazer" [level=2] [ref=e303]
      - generic [ref=e304]:
        - paragraph [ref=e305]: O Sítio Itaguaçú é uma propriedade privada destinada à aluguéis de fim de semana, temporada, casamentos, aniversários, formaturas e a mais variada gama de eventos possíveis. A cachoeira é a identidade natural de todo este espaço, sem contar toda a área de floresta preservada, lagos de pesca e área para camping. De fato uma fuga da vida urbana para a serenidade da natureza, que proporciona paz mental e espiritual.
        - paragraph [ref=e306]: Além de todo o espaço natural, possuímos estrutura de hospedagem, lazer e entretenimento, como por exemplo, uma casa com cinco suítes, sala de estar com lareira, cozinha completa e um dormitório separado com duas suítes e um quarto. Salão de jogos com mesas de sinuca, pebolim e tênis de mesa. Piscina com área para crianças e altura máxima de 1,8 metros. Espaço Gourmet com churrasqueiras, freezer e espaço coberto para confraternizações. Playground, casa de boneca e minicampo com dois gols.
